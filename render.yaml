services:
  - type: web
    name: worldcup-prediction
    env: python
    region: singapore
    plan: starter
    buildCommand: pip install -r uploads/worldcup/requirements.txt
    startCommand: cd uploads/worldcup && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATA_DIR
        value: /var/data
    disk:
      name: worldcup-data
      mountPath: /var/data
      sizeGB: 1
